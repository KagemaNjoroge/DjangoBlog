{% load static %}
{% load i18n %}
{% load compress %}
{% load vite_tags %}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>{{ SITE_NAME }} | {% block page_title %}Account{% endblock %}</title>
    <link rel="icon" href="/favicon.ico">

    <!-- 防闪烁脚本：必须在CSS加载前立即执行 -->
    <script>
        (function () {
            const STORAGE_KEY = 'dark-mode-enabled';
            const THEME_ATTR = 'data-theme';
            const ENABLE_SYSTEM = true;

            function getPreferredTheme() {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved !== null) return saved === 'dark' ? 'dark' : 'light';
                if (ENABLE_SYSTEM && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    return 'dark';
                }
                return 'light';
            }

            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.setAttribute(THEME_ATTR, 'dark');
                    if (document.body) document.body.setAttribute(THEME_ATTR, 'dark');
                } else {
                    document.documentElement.removeAttribute(THEME_ATTR);
                    if (document.body) document.body.removeAttribute(THEME_ATTR);
                }
            }

            applyTheme(getPreferredTheme());
        })();
    </script>

    <!-- 新前端：Tailwind CSS + Alpine.js + HTMX（通过Vite构建） -->
    {% vite_js 'src/main.js' %}

    <!-- 插件CSS文件 -->
    {% compress css %}
    {% block compress_css %}{% endblock %}
    {% endcompress %}
</head>

<body
    class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-950 min-h-screen flex items-center justify-center p-4"
    x-data="{ showPassword: false }">
    {% block content %}{% endblock %}

    <!-- 深色模式切换按钮（与主站一致） -->
    <div class="dark-mode-toggle-fixed">
        <button type="button" id="dark-mode-toggle-btn" class="dark-mode-toggle-btn" aria-label="switch theme"
            title="Switch to night mode" @click="window.DarkMode && window.DarkMode.toggle()">
            <span class="icon-light">☀️</span>
            <span class="icon-dark">🌙</span>
        </button>
    </div>
</body>

</html>
