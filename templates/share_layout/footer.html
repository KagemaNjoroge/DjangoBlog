<footer id="colophon" class="site-footer" role="contentinfo">
    <!-- 装饰性顶部分隔 -->
    <div class="footer-divider"></div>

    <div class="footer-content">
        <!-- 第一行：版权和主要链接 -->
        <div class="footer-section footer-main">
            <div class="footer-copyright">
                <span class="copyright-text">
                    <svg class="inline-block w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"
                            clip-rule="evenodd" />
                    </svg>
                    {{ CURRENT_YEAR }} <a href="/" class="footer-link-brand">{{ SITE_NAME }}</a>
                </span>
            </div>

            <div class="footer-links">
                <a href="/sitemap.xml" class="footer-link" title="SiteMap">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                    </svg>
                    SiteMap
                </a>
                <a href="/feed" class="footer-link" title="RSS Feed">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 5c7.18 0 13 5.82 13 13M6 11a7 7 0 017 7m-6 0a1 1 0 11-2 0 1 1 0 012 0z" />
                    </svg>
                    RSS
                </a>
                <a href="{%url 'blog:links'%}" class="footer-link" title="Friendly links" rel="nofollow">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                    </svg>
                    Friendly links
                </a>

            </div>
        </div>

        <!-- 第二行：技术栈和性能信息 -->
        <div class="footer-section footer-meta">
            <div class="footer-tech">
                <span class="text-gray-500 dark:text-gray-400">Powered by</span>
                <a href="https://www.djangoproject.com/" class="footer-link" rel="nofollow">Django</a>
                <span class="text-gray-400 dark:text-gray-600">•</span>
                <a href="https://github.com/kagemanjoroge" class="footer-link" rel="nofollow">Kagema Njoroge</a>
                <span class="text-gray-400 dark:text-gray-600">•</span>
                <a href="https://kifaru.dev" class="footer-link">
                    Tech Gossip Club
                </a>
            </div>
            <div class="footer-performance">
                <svg class="w-4 h-4 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                <span class="text-gray-500 dark:text-gray-400">Loading time</span>
                <span class="text-primary-500 font-medium">
                    <!!LOAD_TIMES!!>s
                </span>
            </div>
        </div>

        {% if ANALYTICS_CODE %}
        {{ ANALYTICS_CODE| safe }}
        {% endif %}
        {% if GLOBAL_FOOTER %}
        {{ GLOBAL_FOOTER|safe }}
        {% endif %}
</footer><!-- #colophon -->
