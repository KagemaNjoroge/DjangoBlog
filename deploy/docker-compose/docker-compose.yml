version: '3'

services:
  db:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_DB=djangoblog
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=QQQQwww123!@#
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    container_name: db

  djangoblog:
    build:
      context: ../../
      dockerfile: Dockerfile
    restart: always
    command: bash -c 'sh /code/djangoblog/deploy/entrypoint.sh'
    ports:
      - "8000:8000"
    volumes:
      # 使用named volume共享静态文件给nginx
      - static_files:/code/djangoblog/collectedstatic
      - ./logs:/code/djangoblog/logs
      - ./uploads:/code/djangoblog/uploads
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_POSTGRES_DATABASE=djangoblog
      - DJANGO_POSTGRES_USER=postgres
      - DJANGO_POSTGRES_PASSWORD=QQQQwww123!@#
      - DJANGO_POSTGRES_HOST=db
      - DJANGO_POSTGRES_PORT=5432
      - DJANGO_REDIS_URL=redis:6379
    links:
      - db
      - redis
    depends_on:
      - db
    container_name: djangoblog
  nginx:
    restart: always
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx.conf:/etc/nginx/nginx.conf
      # 使用同一个named volume访问静态文件
      - static_files:/code/djangoblog/collectedstatic:ro
    links:
      - djangoblog:djangoblog
    container_name: nginx

  redis:
    restart: always
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  static_files:
